<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #1e1e1e;
    color: #d4d4d4;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 16px;
}
/* ===== AUTH ===== */
#authOverlay {
    display: none;
    position: fixed; inset: 0; z-index: 900;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
}
#authOverlay.show { display: flex; }
.auth-box {
    background: #161b22; border: 1px solid #30363d; border-radius: 14px;
    padding: 44px 40px 34px; width: 460px; position: relative;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    animation: authPop 0.3s ease;
}
@keyframes authPop {
    0% { opacity: 0; transform: scale(0.9) translateY(10px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
}
.auth-box::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: linear-gradient(90deg, #238636, #4ec9b0);
    border-radius: 12px 12px 0 0;
}
.auth-box .auth-close {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none; color: #555; font-size: 18px;
    cursor: pointer; padding: 2px 6px; border-radius: 4px;
    transition: all 0.15s;
}
.auth-box .auth-close:hover { color: #e6edf3; background: #21262d; }
.auth-box .auth-icon {
    width: 48px; height: 48px; border-radius: 12px;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
}
.auth-box .auth-icon img { width: 100%; height: 100%; object-fit: cover; }
.auth-box h2 {
    color: #e6edf3; font-size: 20px; font-weight: 600;
    text-align: center; margin-bottom: 4px;
}
.auth-box .auth-sub {
    text-align: center; color: #8b949e; font-size: 13px;
    margin-bottom: 24px;
}
.auth-box .auth-field {
    position: relative; margin-bottom: 14px;
}
.auth-box .auth-field label {
    display: block; font-size: 12px; color: #8b949e;
    margin-bottom: 4px; font-weight: 500;
}
.auth-box .auth-field input {
    width: 100%; padding: 10px 12px;
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    color: #e6edf3; font-size: 14px; outline: none;
    transition: border-color 0.2s;
}
.auth-box .auth-field input:focus {
    border-color: #4ec9b0; box-shadow: 0 0 0 2px rgba(78,201,176,0.15);
}
.auth-box .auth-field input::placeholder { color: #484f58; }
.auth-box .auth-btn {
    width: 100%; padding: 11px; border: none; border-radius: 6px;
    background: linear-gradient(135deg, #238636, #2ea043);
    color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
}
.auth-box .auth-btn:hover { background: linear-gradient(135deg, #2ea043, #3fb950); transform: translateY(-1px); }
.auth-box .auth-btn:active { transform: translateY(0); }
.auth-box .auth-error {
    color: #f85149; font-size: 13px; margin-bottom: 12px; display: none;
    background: rgba(248,81,73,0.1); padding: 8px 12px; border-radius: 6px;
    border: 1px solid rgba(248,81,73,0.2);
}
.auth-box .auth-toggle {
    text-align: center; margin-top: 18px; font-size: 13px; color: #8b949e;
    padding-top: 16px; border-top: 1px solid #21262d;
}
.auth-box .auth-toggle span { color: #4ec9b0; cursor: pointer; font-weight: 500; }
.auth-box .auth-toggle span:hover { text-decoration: underline; }
/* ===== OAUTH ===== */
.oauth-section { margin-top: 16px; }
.oauth-divider { display: flex; align-items: center; gap: 12px; color: #555; font-size: 12px; margin-bottom: 12px; }
.oauth-divider::before, .oauth-divider::after { content: ''; flex: 1; height: 1px; background: #21262d; }
.oauth-buttons { display: flex; flex-direction: column; gap: 8px; }
.oauth-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 10px; border: 1px solid #30363d; border-radius: 6px;
    background: #0d1117; color: #e6edf3; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.oauth-btn:hover { background: #21262d; border-color: #4ec9b0; }
.oauth-btn:active { transform: translateY(-1px); }
.oauth-icon { width: 18px; height: 18px; flex-shrink: 0; }
.pw-strength { display: none; margin-top: 8px; align-items: center; gap: 8px; }
.pw-strength.show { display: flex; }
.pw-bar { height: 4px; flex: 1; border-radius: 4px; background: #30363d; transition: all 0.2s; overflow: hidden; }
.pw-bar-fill { height: 100%; border-radius: 4px; transition: all 0.25s; width: 0%; }
.pw-label { font-size: 11px; color: #8b949e; min-width: 50px; text-align: left; white-space: nowrap; }
/* ===== HEADER ===== */
header {
    background: #1e1e1e;
    padding: 0 20px; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid #4ec9b0;
    position: relative;
}
header h1 {
    font-size: 16px; font-weight: 600; color: #e6edf3;
    display: flex; align-items: center; gap: 10px;
}
header h1 .logo {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    overflow: hidden;
}
header h1 .logo img { width: 100%; height: 100%; object-fit: cover; }
.header-left, .header-right { display: flex; align-items: center; gap: 12px; }
.controls { display: flex; gap: 8px; align-items: center; }
.btn {
    padding: 8px 20px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.btn-run { background: linear-gradient(135deg, #4ec9b0, #3db89f); color: #1e1e1e; }
.btn-run:hover { background: linear-gradient(135deg, #3db89f, #2ea890); box-shadow: 0 4px 12px rgba(78,201,176,0.3); transform: translateY(-1px); }
.btn-run:disabled { background: #555; cursor: not-allowed; }
.btn-clear { background: #555; color: #d4d4d4; }
.btn-clear:hover { background: #666; }
.btn-save { background: #0e639c; color: #fff; }
.btn-save:hover { background: #1177bb; }
.btn-sm { padding: 3px 10px; font-size: 11px; }
/* ===== MAIN ===== */
.main { display: flex; flex: 1; overflow: hidden; }
/* ===== SIDEBAR ===== */
.sidebar {
    width: 270px; min-width: 270px; background: #252526;
    border-right: 1px solid #3c3c3c; display: flex; flex-direction: column;
    font-size: 14px;
}
.sidebar-header {
    padding: 11px 16px; font-size: 11px; text-transform: uppercase;
    color: #888; letter-spacing: 0.8px;
    border-bottom: 1px solid #2d2d2d; display: flex; justify-content: space-between; align-items: center;
    background: #1e1e1e;
}
.sidebar-header .side-actions { display: flex; gap: 2px; }
.sidebar-header .side-actions button {
    background: none; border: none; color: #777; cursor: pointer;
    font-size: 16px; padding: 2px 5px; border-radius: 4px; transition: all 0.15s;
    width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center;
}
.sidebar-header .side-actions button:hover { background: #30363d; color: #4ec9b0; }
.sidebar-content {
    flex: 1; overflow-y: auto; padding: 6px 0;
}
.sidebar-content::-webkit-scrollbar { width: 5px; }
.sidebar-content::-webkit-scrollbar-track { background: transparent; }
.sidebar-content::-webkit-scrollbar-thumb { background: #424242; border-radius: 3px; }
.sidebar-content::-webkit-scrollbar-thumb:hover { background: #555; }
/* ===== EDITOR & OUTPUT ===== */
.editor-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.output-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.panel-header {
    background: #2d2d2d; padding: 8px 16px; font-size: 12px;
    color: #aaa; border-bottom: 2px solid #3c3c3c;
    display: flex; align-items: center; gap: 8px;
    letter-spacing: 0.3px;
}
.CodeMirror { flex: 1; height: auto !important; font-family: 'Consolas', 'Courier New', monospace; font-size: 16px; line-height: 1.7; background: #1e1e1e; color: #d4d4d4; }
.CodeMirror-gutters { background: #252526; border-right: 1px solid #3c3c3c; }
.CodeMirror-linenumber { color: #555; padding: 0 8px 0 4px; }
.CodeMirror-cursor { border-left: 2px solid #4ec9b0; }
.CodeMirror-selected { background: #264f78; }
.CodeMirror-focused .CodeMirror-selected { background: #264f78; }
.CodeMirror-matchingbracket { background: rgba(78,201,176,0.2); border-bottom: 1px solid #4ec9b0; }
.cm-keyword { color: #c586c0 !important; }
.cm-builtin { color: #dcdcaa !important; }
.cm-number { color: #b5cea8 !important; }
.cm-string { color: #ce9178 !important; }
.cm-string-2 { color: #ce9178 !important; }
.cm-comment { color: #6a9955 !important; font-style: italic; }
.cm-def { color: #dcdcaa !important; }
.cm-operator { color: #d4d4d4 !important; }
.cm-variable { color: #d4d4d4 !important; }
.cm-variable-2 { color: #9cdcfe !important; }
.cm-variable-3 { color: #4ec9b0 !important; }
.cm-atom { color: #569cd6 !important; }
.cm-meta { color: #9cdcfe !important; }
.cm-tag { color: #569cd6 !important; }
.cm-attribute { color: #9cdcfe !important; }
.cm-bracket { color: #d4d4d4 !important; }
.cm-error { color: #f44747 !important; }
.CodeMirror-hints { background: #252526; border: 1px solid #3c3c3c; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; }
.CodeMirror-hint { color: #d4d4d4; padding: 4px 10px; }
.CodeMirror-hint-active { background: #4ec9b0; color: #1e1e1e; }
#output {
    flex: 1; background: #1a1a1a; color: #d4d4d4; padding: 16px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 15px; line-height: 1.6; overflow: auto; white-space: pre-wrap;
}
#output .error { color: #f44747; }
#output .success { color: #4ec9b0; }
#output .info { color: #888; }
.status-bar {
    background: #007acc; padding: 4px 16px; font-size: 12px;
    color: #fff; display: flex; justify-content: space-between;
}
/* ===== MODAL ===== */
#modalOverlay {
    display: none; position: fixed; inset: 0; z-index: 950;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(3px);
    align-items: center; justify-content: center;
}
#modalOverlay.show { display: flex; }
.modal-box {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 32px 28px 24px; width: 410px; position: relative;
    box-shadow: 0 20px 56px rgba(0,0,0,0.5);
    animation: modalPop 0.25s ease;
}
@keyframes modalPop {
    0% { opacity: 0; transform: scale(0.92) translateY(8px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-box h3 { font-size: 16px; color: #e6edf3; margin-bottom: 4px; font-weight: 600; }
.modal-box .modal-sub { font-size: 12px; color: #8b949e; margin-bottom: 16px; }
.modal-box input {
    width: 100%; padding: 10px 12px; background: #0d1117; border: 1px solid #30363d;
    border-radius: 6px; color: #e6edf3; font-size: 14px; outline: none;
    transition: border-color 0.2s; margin-bottom: 12px;
}
.modal-box input:focus { border-color: #4ec9b0; box-shadow: 0 0 0 2px rgba(78,201,176,0.15); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-actions button {
    padding: 8px 18px; border: none; border-radius: 6px; font-size: 13px;
    font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.modal-actions .modal-cancel { background: #21262d; color: #e6edf3; }
.modal-actions .modal-cancel:hover { background: #30363d; }
.modal-actions .modal-confirm { background: #238636; color: #fff; }
.modal-actions .modal-confirm:hover { background: #2ea043; }
/* ===== FILE TREE ===== */
.file-item {
    padding: 6px 12px 6px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    color: #ccc; transition: all 0.1s; font-size: 14px;
    border-left: 3px solid transparent;
}
.file-item:hover { background: #2a2d2e; }
.file-item.active { background: #37373d; color: #fff; border-left-color: #4ec9b0; }
.file-item .icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
.file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-item .file-actions { display: none; gap: 2px; margin-left: auto; padding: 0 4px; }
.file-item:hover .file-actions { display: flex; }
.file-item .file-actions button {
    background: none; border: none; color: #666; cursor: pointer;
    font-size: 12px; padding: 2px 5px; border-radius: 4px;
    transition: all 0.12s; line-height: 1;
}
.file-item .file-actions button:hover { color: #e6edf3; background: #3c3c3c; }
.file-item .file-actions .del-btn:hover { color: #f85149; }
.file-item.dir { color: #9cdcfe; font-weight: 500; }
.file-item.target { background: #2a3a35; border-left-color: #4ec9b0; }
.sidebar-path { cursor: pointer; user-select: none; }
.sidebar-path:hover { color: #4ec9b0; }
/* ===== LIGHT MODE ===== */
body.light-mode { background: #fff; }
body.light-mode header { background: #f5f5f5; border-bottom-color: #238636; }
body.light-mode header h1 { color: #1e1e1e; }
body.light-mode .sidebar { background: #f3f3f3; border-right-color: #ddd; }
body.light-mode .sidebar-header { background: #e8e8e8; color: #555; border-bottom-color: #ddd; }
body.light-mode .sidebar-header .side-actions button:hover { background: #d0d0d0; color: #238636; }
body.light-mode .sidebar-content::-webkit-scrollbar-thumb { background: #bbb; }
body.light-mode .sidebar-content::-webkit-scrollbar-thumb:hover { background: #999; }
body.light-mode .file-item { color: #333; }
body.light-mode .file-item:hover { background: #e8e8e8; }
body.light-mode .file-item.active { background: #d4d4d4; color: #1e1e1e; border-left-color: #238636; }
body.light-mode .file-item.target { background: #d8efe8; }
body.light-mode .file-item.dir { color: #0563c1; }
body.light-mode .file-item .file-actions button:hover { color: #333; background: #ccc; }
body.light-mode .file-item .file-actions .del-btn:hover { color: #d32f2f; }
body.light-mode .panel-header { background: #e8e8e8; color: #555; border-bottom-color: #ccc; }
body.light-mode .CodeMirror { background: #fafafa; color: #333; }
body.light-mode .CodeMirror-gutters { background: #f0f0f0; border-right-color: #ddd; }
body.light-mode .CodeMirror-linenumber { color: #999; }
body.light-mode .CodeMirror-cursor { border-left-color: #333; }
body.light-mode .CodeMirror-selected { background: #add6ff; }
body.light-mode .CodeMirror-focused .CodeMirror-selected { background: #add6ff; }
body.light-mode .CodeMirror-matchingbracket { background: rgba(0,0,0,0.1); border-bottom-color: #666; }
body.light-mode #output { background: #fafafa; color: #333; }
body.light-mode .status-bar { background: #0e639c; }
body.light-mode .modal-box { background: #f6f8fa; border-color: #d0d7de; }

/* ===== DROPDOWN ===== */
.dropdown { position: relative; display: inline-block; }
.dropbtn {
    background: #2d2d2d; border: 1px solid #3c3c3c; color: #d4d4d4; font-size: 18px;
    cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: all 0.15s;
    line-height: 1; width: 36px; height: 32px; display: inline-flex;
    align-items: center; justify-content: center;
}
.dropbtn:hover { border-color: #4ec9b0; background: #3c3c3c; }
.dropdown-content {
    display: none; position: absolute; right: 0; top: 100%; min-width: 220px;
    background: #2d2d2d; border: 1px solid #3c3c3c; border-radius: 10px;
    padding: 6px; z-index: 100; margin-top: 8px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
}
.dropdown-content.show { display: block; }
.drop-item {
    display: flex; align-items: center; gap: 10px; width: 100%;
    text-align: right; padding: 10px 14px;
    background: none; border: none; color: #d4d4d4; font-size: 14px;
    cursor: pointer; border-radius: 6px; transition: all 0.15s;
    font-family: inherit; white-space: nowrap;
}
.drop-item:hover { background: #3c3c3c; color: #e6edf3; }
.drop-item:last-child { border-bottom: none; }
.drop-user {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; color: #4ec9b0; font-size: 13px; font-weight: 500;
    border-bottom: 1px solid #3c3c3c; margin-bottom: 4px;
}
.drop-divider { height: 1px; background: #3c3c3c; margin: 4px 0; }
/* ===== INFO OVERLAY ===== */
#infoOverlay {
    display: none; position: fixed; inset: 0; z-index: 900;

/* ===== SPLASH ===== */
#splashScreen {
    position: fixed; inset: 0; z-index: 9999;
    background: #1e1e1e;
    display: flex; align-items: center; justify-content: center;
    animation: splashFade 0.6s ease 3s forwards;
}
.splash-content { text-align: center; }
.splash-logo { font-size: 72px; animation: splashPulse 0.8s ease-in-out infinite; }
@keyframes splashPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.12); }
}
.splash-title { font-size: 28px; font-weight: 700; color: #fff; margin: 12px 0 4px; letter-spacing: -0.5px; }
.splash-sub { font-size: 13px; color: #8b949e; letter-spacing: 0.3px; }
.splash-features { margin: 18px 0 0; font-size: 12px; color: #6e7681; line-height: 2; }
.splash-features span { display: inline-block; margin: 0 6px; }
.splash-loader {
    width: 180px; height: 3px; background: #2d2d2d; border-radius: 3px;
    margin: 24px auto 0; overflow: hidden;
}
.splash-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #4ec9b0, #2ea043);
    border-radius: 3px; animation: splashLoad 2s ease 0.3s forwards;

@keyframes splashLoad {

@keyframes splashFade {

CodeMirror.registerHelper("hint", "python", function(cm) {
    const cursor = cm.getCursor();
    const token = cm.getTokenAt(cursor);
    const start = token.start;
    const end = cursor.ch;
    const line = cm.getLine(cursor.line);
    const word = line.slice(start, end);
    if (!word || word.length < 1) return null;
    const list = PY_SUGGESTIONS.filter(item => item.toLowerCase().startsWith(word.toLowerCase())).slice(0, 20);
    if (!list.length) return null;
    return { list, from: { line: cursor.line, ch: start }, to: { line: cursor.line, ch: end } };
});

    cm.on("keyup", function(instance, event) {
        const k = event.key;
        if (k.length > 1 || event.ctrlKey || event.metaKey || event.altKey) return;
        instance.showHint({ hint: CodeMirror.hint.python, completeSingle: false });
    });

    let saveTimer;
    cm.on("change", function() {
        if (token) { clearTimeout(saveTimer); saveTimer = setTimeout(saveCurrentFile, 1500); }
        else { clearTimeout(saveTimer); saveTimer = setTimeout(() => localStorage.setItem('guestCode', cm.getValue()), 2000); }
    });

    const guestCode = localStorage.getItem('guestCode');
    if (guestCode && !token) cm.setValue(guestCode);

async function handleOAuthToken(supabaseToken) {
    try {
        const res = await fetch('/api/oauth-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: supabaseToken })
        });

        if (data.error) { oauthSpinner.classList.remove('show'); showAuthError(data.error); return; }
        token = data.token;

        localStorage.setItem('currentUser', currentUser);
        authOverlay.classList.remove('show');
        authUser.value = '';

}

function handleOAuth(provider) {
    const redirectTo = window.location.origin + '/auth/callback';
    const url = 'https://oikzwjqyctureqkcigrx.supabase.co/auth/v1/authorize?provider=' + provider + '&redirect_to=' + encodeURIComponent(redirectTo);
    const w = 600, h = 700;
    const left = Math.max(0, (screen.width - w) / 2), top = Math.max(0, (screen.height - h) / 2);
    authError.style.display = 'none';
    oauthSpinner.classList.add('show');
    oauthPopup = window.open(url, 'oauth', 'width=' + w + ',height=' + h + ',left=' + left + ',top=' + top + ',menubar=no,toolbar=no,location=yes');
    if (!oauthPopup || oauthPopup.closed) {
        oauthSpinner.classList.remove('show');
        showAuthError('Popup blocked. Please allow popups for this site.');

    const checkClosed = setInterval(() => {

}

const pwStrength = document.getElementById('pwStrength');
const pwBar = document.getElementById('pwBar');
const pwLabel = document.getElementById('pwLabel');
function calcStrength(pw) {
    if (!pw) return { pct: 0, color: '#30363d', text: '' };
    let s = 0;
    if (pw.length >= 8) s++;
    if (pw.length >= 12) s++;
    if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) s++;
    if (/\d/.test(pw)) s++;
    if (/[^a-zA-Z0-9]/.test(pw)) s++;
    const map = [
        { pct: 20, color: '#f85149', text: 'Weak' },
        { pct: 20, color: '#f85149', text: 'Weak' },
        { pct: 40, color: '#d29922', text: 'Fair' },
        { pct: 60, color: '#4ec9b0', text: 'Good' },
        { pct: 80, color: '#3fb950', text: 'Strong' },
        { pct: 100, color: '#3fb950', text: 'Strong' },
    ];
    return map[Math.min(s, 5)];
}

    if (name.endsWith('.yml') || name.endsWith('.yaml')) return '⚙️';
    if (name.endsWith('.env')) return '🔒';
    if (name.endsWith('.gitignore')) return '🚫';
    return '📄';
}

function renderTree(entries, container, basePath) {
    container.innerHTML = '';
    const sorted = [...entries].sort((a, b) => {
        if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
        return a.name.localeCompare(b.name);
    });
    for (const entry of sorted) {
        const div = document.createElement('div');
        div.className = 'file-item' + (entry.type === 'dir' ? ' dir' : '');
        div.dataset.path = entry.path;

        const indent = document.createElement('span');
        indent.className = 'indent';
        indent.style.width = basePath.split('/').filter(Boolean).length * 14 + 'px';
        div.appendChild(indent);

        const icon = document.createElement('span');
        icon.className = 'icon';
        icon.textContent = entry.type === 'dir' ? '📁' : fileIcon(entry.name);
        div.appendChild(icon);

        const name = document.createElement('span');
        name.className = 'name';
        name.textContent = entry.name;
        div.appendChild(name);

        const actions = document.createElement('span');
        actions.className = 'file-actions';
        const renameBtn = document.createElement('button');
        renameBtn.textContent = '✎';
        renameBtn.title = 'Rename';
        renameBtn.addEventListener('click', (e) => { e.stopPropagation(); showRenameModal(entry.path); });
        actions.appendChild(renameBtn);
        const delBtn = document.createElement('button');
        delBtn.textContent = '✕';
        delBtn.className = 'del-btn';
        delBtn.title = 'Delete';
        delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteItem(entry.path); });
        actions.appendChild(delBtn);
        div.appendChild(actions);

        div.addEventListener('click', (e) => {
            e.stopPropagation();
            if (entry.type === 'dir') {
                currentDir = entry.path;
                updateSidebarPath();
                document.querySelectorAll('.file-item.target').forEach(el => el.classList.remove('target'));
                div.classList.add('target');
            } else {
                openFile(entry.path);
            }
        });

        container.appendChild(div);

        if (entry.type === 'dir' && entry.children) {
            const childContainer = document.createElement('div');
            renderTree(entry.children, childContainer, entry.path);
            childContainer.style.display = 'none';
            container.appendChild(childContainer);

            div.addEventListener('click', (e) => {
                e.stopPropagation();
                const isHidden = childContainer.style.display === 'none';
                childContainer.style.display = isHidden ? '' : 'none';
                icon.textContent = isHidden ? '📂' : '📁';
            });
        }
    }
    highlightActive();
}

function highlightActive() {
    fileTree.querySelectorAll('.file-item').forEach(el => {
        el.classList.toggle('active', el.dataset.path === currentFilePath);
    });
}

// ===== FILE OPERATIONS =====
newFileBtn.addEventListener('click', () => {
    const ctx = currentDir ? ' in "' + currentDir + '"' : '';
    showModal('New File', 'Enter filename with extension' + ctx, 'main.py', (name) => {
        createItem(name, 'file');
    });
});

newFolderBtn.addEventListener('click', () => {
    const ctx = currentDir ? ' in "' + currentDir + '"' : '';
    showModal('New Folder', 'Enter folder name' + ctx, 'utils', (name) => {
        createItem(name, 'dir');
    });
});

document.getElementById('sidebarPath').addEventListener('click', () => {
    if (!currentDir) return;
    currentDir = '';
    updateSidebarPath();
    document.querySelectorAll('.file-item.target').forEach(el => el.classList.remove('target'));
});

let renameOldPath = '';
function showRenameModal(path) {
    const name = path.split('/').pop();
    renameOldPath = path;
    showModal('Rename', 'Enter new name', name, (newName) => {
        renameItem(renameOldPath, newName);
    });
    modalInput.value = name;
    setTimeout(() => modalInput.select(), 150);
}

function findEntry(files, path) {
    for (let f of files) {
        if (f.path === path) return { entry: f, list: files, idx: files.indexOf(f) };
        if (f.children) { let r = findEntry(f.children, path); if (r) return r; }
    }
    return null;
}

function renameItem(oldPath, newName) {
    if (!token) return;
    const files = getFileIndex();
    const found = findEntry(files, oldPath);
    if (!found) return;
    const parts = oldPath.split('/');
    parts.pop();
    parts.push(newName);
    const newPath = parts.join('/');
    found.entry.name = newName;
    found.entry.path = newPath;
    saveFileIndex(files);
    if (getFC(oldPath)) { setFC(newPath, getFC(oldPath)); removeFC(oldPath); }
    loadFileTree();
    if (currentFilePath === oldPath) openFile(newPath);
}

function openFile(path) {
    if (!token) return;
    currentFilePath = path;
    cm.setValue(getFC(path));
    editorTab.textContent = '📄 ' + path.split('/').pop();
    highlightActive();
    openFileLabel.textContent = path;
    openFileLabel.style.display = 'inline';
}

function saveCurrentFile() {
    if (!token || !currentFilePath) return;
    setFC(currentFilePath, cm.getValue());
}

function createItem(name, type) {
    if (!token) return;
    const files = getFileIndex();
    const fullPath = currentDir ? currentDir + '/' + name : name;
    const entry = { name, path: fullPath, type };
    if (type === 'dir') entry.children = [];
    if (currentDir) {
        const found = findEntry(files, currentDir);
        if (found && found.entry.children) {
            found.entry.children.push(entry);
        } else {
            files.push(entry);
        }
    } else {
        files.push(entry);
    }
    saveFileIndex(files);
    loadFileTree();
    if (type === 'file') openFile(fullPath);
}

function removeContentRecursive(entry) {
    if (entry.type === 'file') removeFC(entry.path);
    else if (entry.children) entry.children.forEach(removeContentRecursive);
}
function deleteItem(path) {
    if (!token) return;
    if (!confirm('Delete ' + path + '?')) return;
    const files = getFileIndex();
    const found = findEntry(files, path);
    if (!found) return;
    removeContentRecursive(found.entry);
    found.list.splice(found.idx, 1);
    saveFileIndex(files);
    loadFileTree();
    if (path === currentFilePath) { currentFilePath = ''; editorTab.textContent = '📄 Editor'; cm.setValue(''); openFileLabel.style.display = 'none'; }
}

// ===== RUN =====
runBtn.addEventListener('click', async () => {
    const code = cm.getValue().trim();
    if (!code) return;
    output.innerHTML = '';
    runBtn.disabled = true; runBtn.textContent = '...';

    try {
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = 'Bearer ' + token;
        const res = await fetch('/api/run', { method: 'POST', headers, body: JSON.stringify({ code }) });
        const data = await res.json();
        if (data.output) output.innerHTML += data.output.replace(/\n/g, '<br>');
        if (data.error) output.innerHTML += '<span class="error">' + data.error.replace(/\n/g, '<br>') + '</span>';
        if (!data.output && !data.error) output.innerHTML = '<span class="success">Done</span>';
    } catch (e) { output.innerHTML = '<span class="error">Connection error</span>'; }
    finally { runBtn.disabled = false; runBtn.textContent = '▶ Run'; }
});

clearBtn.addEventListener('click', () => { output.innerHTML = ''; });

saveBtn.addEventListener('click', () => {
    if (token) saveCurrentFile();
    else { localStorage.setItem('guestCode', cm.getValue()); output.innerHTML = '<span class="success">Saved locally</span>'; }
});

function setStatusRight(text) { statusRight.textContent = text || ''; }
</script>
