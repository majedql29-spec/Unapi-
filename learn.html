<script>
// ===== LESSONS DATA =====
const LESSONS = [
  {
    title: "Hello, World!", level: "beginner", mins: 5,
    code: `print("Hello, World!")`,
    content: `
      <p>Welcome to Python! The first thing every programmer writes is a program that prints "Hello, World!". Python makes this incredibly simple.</p>
      <p>Type the code below and press <strong>Run</strong> to see the output.</p>
      <div class="tip"><strong>Tip:</strong> Click "Open in Editor" to load this code into the editor and run it.</div>
    `
  },
  {
    title: "Variables & Data Types", level: "beginner", mins: 8,
    code: `name = "Uscrovis"
age = 2
pi = 3.14
is_fun = True
print(f"Welcome to {name}, age {age}, pi = {pi}, is it fun? {is_fun}")`,
    content: `
      <p>Python has several built-in data types. The most common are <strong>strings</strong> (text), <strong>integers</strong> (whole numbers), <strong>floats</strong> (decimals), and <strong>booleans</strong> (True/False).</p>
      <p>You don't need to declare the type — Python infers it automatically.</p>
      <div class="tip"><strong>Note:</strong> Use <code>type()</code> to check a variable's type.</div>
    `
  },
  {
    title: "Strings & Formatting", level: "beginner", mins: 7,
    code: `name = "Uscrovis"
lang = "Python"
# f-strings (Python 3.6+)
print(f"{name} is a free online {lang} IDE")
# Methods
print(lang.upper())
print(lang.lower())
print(len(lang))`,
    content: `
      <p>Strings are sequences of characters. Python offers powerful ways to format and manipulate them.</p>
      <p><strong>f-strings</strong> (Python 3.6+) let you embed variables directly in strings using <code>{variable}</code>.</p>
    `
  },
  {
    title: "Lists & Loops", level: "beginner", mins: 10,
    code: `fruits = ["apple", "banana", "cherry"]
for fruit in fruits:
    print(fruit)
print()
# Range loop
for i in range(5):
    print(i, end=" ")`,
    content: `
      <p>Lists store multiple items in one variable. Use a <strong>for loop</strong> to iterate over them.</p>
      <p><code>range(n)</code> generates numbers from 0 to n-1.</p>
    `
  },
  {
    title: "Conditions & If/Else", level: "beginner", mins: 8,
    code: `age = 18
if age >= 18:
    print("You can vote!")
elif age >= 16:
    print("Almost there!")
else:
    print("Too young")

# Ternary
status = "Adult" if age >= 18 else "Minor"
print(status)`,
    content: `
      <p>Use <strong>if</strong>, <strong>elif</strong>, and <strong>else</strong> to make decisions in your code.</p>
      <p>Python also supports the <strong>ternary operator</strong>: <code>x if condition else y</code>.</p>
    `
  },
  {
    title: "Functions", level: "beginner", mins: 10,
    code: `def greet(name):
    return f"Hello, {name}!"

def add(a, b):
    return a + b

print(greet("Uscrovis"))
print(add(5, 3))`,
    content: `
      <p>Functions are reusable blocks of code. Define them with <strong>def</strong>.</p>
      <p>A function can take parameters and <strong>return</strong> a value.</p>
    `
  },
  {
    title: "Dictionaries", level: "intermediate", mins: 8,
    code: `user = {
    "name": "Uscrovis",
    "age": 2,
    "language": "Python"
}
print(user["name"])
user["version"] = "1.0"
for key, val in user.items():
    print(f"{key}: {val}")`,
    content: `
      <p>Dictionaries store key-value pairs. They are fast and flexible.</p>
      <p>Use <code>.items()</code> to loop through both keys and values.</p>
    `
  },
  {
    title: "List Comprehensions", level: "intermediate", mins: 10,
    code: `nums = [1, 2, 3, 4, 5]
squares = [n**2 for n in nums]
evens = [n for n in nums if n % 2 == 0]
print("Squares:", squares)
print("Evens:", evens)`,
    content: `
      <p>List comprehension is a concise way to create lists.</p>
      <p>Syntax: <code>[expression for item in iterable if condition]</code></p>
    `
  },
  {
    title: "Error Handling", level: "intermediate", mins: 7,
    code: `try:
    n = int(input("Enter a number: "))
    print(10 / n)
except ValueError:
    print("That's not a number!")
except ZeroDivisionError:
    print("Can't divide by zero!")
else:
    print("No errors!")
finally:
    print("Done")`,
    content: `
      <p>Use <strong>try/except</strong> to handle errors gracefully.</p>
      <p><strong>else</strong> runs if no error, <strong>finally</strong> always runs.</p>
    `
  },
  {
    title: "File Handling", level: "intermediate", mins: 8,
    code: `with open("example.txt", "w") as f:
    f.write("Hello from Uscrovis!")
with open("example.txt", "r") as f:
    content = f.read()
print(content)`,
    content: `
      <p>Use <strong>with open()</strong> to read and write files safely. The file automatically closes when done.</p>
      <p>Modes: <code>"r"</code> (read), <code>"w"</code> (write), <code>"a"</code> (append).</p>
    `
  },
  {
    title: "Classes & OOP", level: "advanced", mins: 12,
    code: `class Dog:
    def __init__(self, name):
        self.name = name
    def bark(self):
        return f"{self.name} says woof!"

my_dog = Dog("Rex")
print(my_dog.bark())`,
    content: `
      <p><strong>Object-Oriented Programming</strong> organizes code into classes.</p>
      <p><code>__init__</code> is the constructor that runs when creating an object.</p>
    `
  },
  {
    title: "Modules & Imports", level: "advanced", mins: 8,
    code: `import math
from random import randint

print(f"Pi: {math.pi}")
print(f"Random 1-10: {randint(1, 10)}")`,
    content: `
      <p>Python's standard library has thousands of modules. Use <strong>import</strong> to load them.</p>
      <p><code>from module import function</code> imports only what you need.</p>
    `
  }
];

// ===== STATE =====
let currentLesson = 0;
const LEVEL_ORDER = ['beginner', 'intermediate', 'advanced'];
const LEVEL_LABELS = { beginner: 'Beginner', intermediate: 'Intermediate', advanced: 'Advanced' };
const LEVEL_BADGE_CLASS = { beginner: 'beginner', intermediate: 'int', advanced: 'adv' };
const LEVEL_META_CLASS = { beginner: 'beginner', intermediate: 'intermediate', advanced: 'advanced' };

function getLevelIndex(l) { return LEVEL_ORDER.indexOf(l); }

// ===== SIDEBAR =====
function renderSidebar() {
  const sidebar = document.getElementById('learnSidebar');
  const total = LESSONS.length;
  const completed = LESSONS.filter((_, i) => localStorage.getItem('lesson_done_' + i) === '1').length;
  const pct = Math.round((completed / total) * 100);

  let sectionHtml = '';
  let currentLevel = '';
  LESSONS.forEach((l, i) => {
    const lvl = l.level;
    if (lvl !== currentLevel) {
      currentLevel = lvl;
      sectionHtml += '<div class="sidebar-section-title">' + LEVEL_LABELS[lvl] + '</div>';
    }
    const isActive = i === currentLesson;
    const isDone = localStorage.getItem('lesson_done_' + i) === '1';
    const cls = 'learn-lesson' + (isActive ? ' active' : '') + (isDone ? ' completed' : '');
    const badge = '<span class="lesson-badge ' + LEVEL_BADGE_CLASS[lvl] + '">' + l.mins + 'm</span>';
    sectionHtml += '<div class="' + cls + '" data-i="' + i + '">' +
      '<div class="lesson-status"><div class="dot"></div></div>' +
      '<span class="lesson-label">' + l.title + '</span>' +
      badge +
      '</div>';
  });

  sidebar.innerHTML =
    '<div class="sidebar-header">' +
      '<h3>Python Course</h3>' +
      '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="progress-text"><span>' + completed + ' of ' + total + ' completed</span><span>' + pct + '%</span></div>' +
    '</div>' +
    '<div class="sidebar-section">' + sectionHtml + '</div>';

  sidebar.querySelectorAll('.learn-lesson').forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.i);
      if (i !== currentLesson) {
        currentLesson = i;
        renderSidebar();
        showLesson(currentLesson);
        localStorage.setItem('last_lesson', i);
        scrollSidebarToActive();
      }
    });
  });
  scrollSidebarToActive();
}

function scrollSidebarToActive() {
  setTimeout(() => {
    const active = document.querySelector('.learn-lesson.active');
    if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }, 50);
}

// ===== LESSON CONTENT =====
function showLesson(i) {
  const l = LESSONS[i];
  const body = document.getElementById('learnBody');
  const num = (i + 1).toString().padStart(2, '0');
  const levelLabel = LEVEL_LABELS[l.level];
  const metaCls = LEVEL_META_CLASS[l.level];

  const prevDisabled = i === 0;
  const nextDisabled = i === LESSONS.length - 1;

  body.innerHTML =
    '<div class="lesson-header">' +
      '<div class="lesson-number">Lesson ' + num + '</div>' +
      '<h1 class="lesson-title">' + l.title + '</h1>' +
      '<div class="lesson-meta">' +
        '<span class="badge ' + metaCls + '">' + levelLabel + '</span>' +
        '<span class="time">&#9201; ' + l.mins + ' min</span>' +
      '</div>' +
    '</div>' +
    '<div class="lesson-body">' + l.content + '</div>' +
    '<div class="code-wrap">' +
      '<div class="code-header">' +
        '<span class="code-lang">Python</span>' +
        '<button class="btn-copy" id="copyBtn" onclick="copyCode(' + i + ')">Copy</button>' +
      '</div>' +
      '<div class="code-block" id="codeBlock">' + l.code + '</div>' +
    '</div>' +
    '<button class="btn btn-run" onclick="openInEditor(' + i + ')">&#9654; Open in Editor & Run</button>' +
    '<div class="lesson-nav">' +
      '<button class="nav-btn" onclick="goLesson(' + (i - 1) + ')"' + (prevDisabled ? ' disabled' : '') + '>&larr; Previous</button>' +
      '<span class="nav-center">' + (i + 1) + ' / ' + LESSONS.length + '</span>' +
      '<button class="nav-btn" onclick="goLesson(' + (i + 1) + ')"' + (nextDisabled ? ' disabled' : '') + '>Next &rarr;</button>' +
    '</div>' +
    '<div class="ad-section"><div class="ad-label">\u2014 Ad \u2014</div><div class="ad-inner"><iframe data-aa="2445989" src="//acceptable.a-ads.com/2445989/?size=Adaptive" style="border:0;padding:0;width:100%;height:auto;overflow:hidden;display:block;margin:auto"></iframe></div></div>';

  // Reset reading progress
  document.getElementById('readingProgress').style.width = '0%';
}

function goLesson(i) {
  if (i < 0 || i >= LESSONS.length) return;
  currentLesson = i;
  localStorage.setItem('last_lesson', i);
  renderSidebar();
  showLesson(currentLesson);
  // Scroll content to top
  document.getElementById('learnContent').scrollTop = 0;
}

function openInEditor(i) {
  window.location.href = '/?code=' + i;
}

function copyCode(i) {
  const code = LESSONS[i].code;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }
}

// ===== KEYBOARD NAV =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') { goLesson(currentLesson - 1); }
  if (e.key === 'ArrowRight') { goLesson(currentLesson + 1); }
});

// ===== READING PROGRESS =====
const contentEl = document.getElementById('learnContent');
contentEl.addEventListener('scroll', () => {
  const scrollTop = contentEl.scrollTop;
  const scrollHeight = contentEl.scrollHeight - contentEl.clientHeight;
  if (scrollHeight > 0) {
    const pct = Math.min((scrollTop / scrollHeight) * 100, 100);
    document.getElementById('readingProgress').style.width = pct + '%';
  }
});

// ===== KBD HINT (hide after first interaction) =====
setTimeout(() => {
  const hint = document.getElementById('kbdHint');
  hint.classList.add('show');
  setTimeout(() => hint.classList.remove('show'), 5000);
}, 2000);
document.addEventListener('keydown', () => {
  document.getElementById('kbdHint').classList.remove('show');
}, { once: true });

// ===== THEME TOGGLE =====
const storedTheme = localStorage.getItem('theme');
if (storedTheme === 'light') { document.body.classList.add('light-mode'); }
document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.classList.toggle('light-mode');
  localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
});

// ===== INIT =====
currentLesson = parseInt(localStorage.getItem('last_lesson')) || 0;
renderSidebar();
showLesson(currentLesson);
scrollSidebarToActive();
</script>
</body>
</html>
